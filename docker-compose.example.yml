# docker-compose.example.yml — End-user deployment example
# Copy this file to your own docker-compose.yml and customise.
#
# Prerequisites:
#   - Create a ./mocks directory for WireMock mappings (or leave empty on first run)
#   - Set FISHTANK_JWT_SECRET to a random string of at least 32 characters
#
# Usage:
#   cp docker-compose.example.yml docker-compose.yml
#   # Edit docker-compose.yml to set required environment variables
#   docker compose up -d

services:
  fishtank:
    image: nicoolodice/fishtank:latest
    ports:
      - "5000:5000"
    volumes:
      # WireMock mappings directory (read-write so WireMock can write recorded mocks)
      - ./mocks:/mocks
      # SQLite database and log files
      - ./fishtank-data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Required — minimum 32 characters; container exits on startup if missing or too short
      - FISHTANK_JWT_SECRET=
      # Optional — path to SQLite database file inside the container
      # - FISHTANK_DB_PATH=/data/fishtank.db
      # Optional — path to WireMock mappings root inside the container
      # - FISHTANK_MOCKS_ROOT=/mocks
      # Optional — port for the management UI (default: 5000)
      # - FISHTANK_MANAGEMENT_PORT=5000
      # Optional — JWT expiry in hours; empty = session cookie (invalidated on restart)
      # - FISHTANK_JWT_EXPIRY_HOURS=
      # Optional — if unset, first login forces a password change
      # - FISHTANK_ADMIN_PASSWORD=
      # Optional — comma-separated additional CORS origins (default: bundled UI origin only)
      # - FISHTANK_ALLOWED_ORIGINS=
      # Optional — login rate limit (default: 5 requests per 60-second window)
      # - FISHTANK_LOGIN_RATE_LIMIT=5
      # - FISHTANK_LOGIN_RATE_WINDOW=60
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
