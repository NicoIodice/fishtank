# docker-compose.yml — Local development
# Runs .NET API and Vite dev server inside SDK containers without building the production image.
# Source code is mounted as volumes so changes are reflected without rebuilds.
#
# Usage:
#   docker compose up      # Start both services
#   docker compose up api  # Start API only
#
# For container smoke testing, build and run the Docker image instead:
#   docker build -t fishtank:dev .
#   docker run --rm -p 5000:5000 fishtank:dev

services:
  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src/Fishtank.Api
    command: dotnet run --urls http://+:5000
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./src:/src

  client:
    image: node:22-alpine
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host"]
    ports:
      - "5173:5173"
    volumes:
      - ./src/client:/app
    depends_on:
      - api
