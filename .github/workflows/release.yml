name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fishtank ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Quick start

            ```bash
            docker run -p 5000:5000 \
              -e FISHTANK_JWT_SECRET=your-secret-min-32-chars \
              -v ./mocks:/mocks \
              nicoolodice/fishtank:${{ github.ref_name }}
            ```

            Then open **http://localhost:5000** in your browser.

            See [`docker-compose.example.yml`](docker-compose.example.yml) for a full deployment reference.

            ## Docker image

            | Tag | Description |
            |-----|-------------|
            | `nicoolodice/fishtank:${{ github.ref_name }}` | This release |
            | `nicoolodice/fishtank:latest` | Latest stable release |

            ## What's changed

            <!-- Auto-generated from merged PRs and commits since the last tag -->
