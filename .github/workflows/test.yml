# Fishtank — CI Test Pipeline
# Generated by BMad TEA — Test Architect Module
# Stack: fullstack (.NET 10 / xUnit + React / Playwright)
# Platform: GitHub Actions
#
# Stages:
#   lint          → ESLint on the React client
#   backend-test  → xUnit unit + integration tests (parallel matrix: unit | integration)
#   frontend-test → Playwright E2E — 4 parallel shards (chromium)
#   burn-in       → 3-iteration flaky-test detection (nightly schedule only)
#   report        → Aggregate Job Summary
#
# Required secrets: none (add PACT_BROKER_* if contract testing is enabled later)

name: Test Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main
  schedule:
    # Nightly Burn-In (Flaky Detection) — 02:00 UTC
    - cron: "0 2 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# LINT
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/client/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/client
        run: npm ci

      - name: ESLint
        working-directory: src/client
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────────
  # BACKEND TESTS — unit and integration run in parallel
  # ─────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests — ${{ matrix.suite.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: "Unit Tests"
            project: "src/Fishtank.Api.UnitTests/Fishtank.Api.UnitTests.csproj"
            artifact: "backend-unit-results"
          - name: "Integration Tests"
            project: "src/Fishtank.Api.IntegrationTests/Fishtank.Api.IntegrationTests.csproj"
            artifact: "backend-integration-results"

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET SDK 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Fishtank.slnx

      - name: Build
        run: dotnet build src/Fishtank.slnx --no-restore

      - name: Test
        run: |
          dotnet test ${{ matrix.suite.project }} --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal"

      - name: Upload TRX results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.suite.artifact }}
          path: "**/*.trx"
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # FRONTEND E2E TESTS — 4 parallel shards
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-test:
    name: E2E Tests (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/client/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('src/client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install frontend dependencies
        working-directory: src/client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/client
        run: npx playwright install --with-deps chromium

      - name: Setup .NET SDK 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore .NET dependencies
        run: dotnet restore src/Fishtank.Api/Fishtank.Api.csproj

      - name: Build .NET API
        run: dotnet build src/Fishtank.Api/Fishtank.Api.csproj --configuration Release --no-restore

      - name: Start .NET API (background)
        env:
          ASPNETCORE_URLS: "http://localhost:5000"
          ASPNETCORE_ENVIRONMENT: "Development"
          FISHTANK_JWT_SECRET: "fishtank-ci-test-only-not-for-production-use-xk9"
          FISHTANK_DB_PATH: "/tmp/fishtank-ci.db"
          FISHTANK_MOCKS_ROOT: "/tmp/fishtank-mocks"
        run: dotnet src/Fishtank.Api/bin/Release/net10.0/Fishtank.Api.dll > /tmp/api.log 2>&1 &

      - name: Wait for .NET API
        run: |
          echo "Waiting for .NET API at http://localhost:5000..."
          for i in $(seq 1 30); do
            if curl -sfL http://localhost:5000/health > /dev/null 2>&1; then
              echo "✅ .NET API ready"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 2s"
            sleep 2
          done
          echo "❌ .NET API did not start in time"
          echo "--- API startup log ---"
          cat /tmp/api.log || true
          exit 1

      - name: Start Vite dev server (background)
        working-directory: src/client
        run: npm run dev &

      - name: Wait for Vite dev server
        run: |
          echo "Waiting for Vite dev server at http://localhost:5173..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Vite dev server ready"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 2s"
            sleep 2
          done
          echo "❌ Vite dev server did not start in time"
          exit 1

      - name: Run E2E tests — shard ${{ matrix.shard }}/4
        working-directory: src/client
        env:
          CI: "true"
          BASE_URL: "http://localhost:5173"
          API_URL: "http://localhost:5000"
        run: npm run test:e2e -- --shard=${{ matrix.shard }}/4

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-${{ matrix.shard }}
          path: src/client/blob-report/
          retention-days: 1

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-artifacts-shard-${{ matrix.shard }}
          path: src/client/test-results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # BURN-IN — flaky test detection (nightly schedule only)
  # ─────────────────────────────────────────────────────────────────────────────
  burn-in:
    name: Nightly Burn-In (Flaky Detection — 3 iterations)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-test, frontend-test]
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/client/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('src/client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install frontend dependencies
        working-directory: src/client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/client
        run: npx playwright install --with-deps chromium

      - name: Setup .NET SDK 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore .NET dependencies
        run: dotnet restore src/Fishtank.Api/Fishtank.Api.csproj

      - name: Build .NET API
        run: dotnet build src/Fishtank.Api/Fishtank.Api.csproj --configuration Release --no-restore

      - name: Start .NET API (background)
        env:
          ASPNETCORE_URLS: "http://localhost:5000"
          ASPNETCORE_ENVIRONMENT: "Development"
          FISHTANK_JWT_SECRET: "fishtank-ci-test-only-not-for-production-use-xk9"
          FISHTANK_DB_PATH: "/tmp/fishtank-ci.db"
          FISHTANK_MOCKS_ROOT: "/tmp/fishtank-mocks"
          # Raise the login rate limit high enough to survive back-to-back burn-in iterations.
          # Each iteration performs several logins (explicit login test + re-auth after
          # the sign-out test invalidates the cached JWT). The default of 5/60s is far
          # too low for back-to-back iterations within the same rate-limit window.
          FISHTANK_LOGIN_RATE_LIMIT: "1000"
          FISHTANK_LOGIN_RATE_WINDOW: "60"
        run: dotnet src/Fishtank.Api/bin/Release/net10.0/Fishtank.Api.dll > /tmp/api.log 2>&1 &

      - name: Wait for .NET API
        run: |
          echo "Waiting for .NET API at http://localhost:5000..."
          for i in $(seq 1 30); do
            if curl -sfL http://localhost:5000/health > /dev/null 2>&1; then
              echo "✅ .NET API ready"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 2s"
            sleep 2
          done
          echo "❌ .NET API did not start in time"
          echo "--- API startup log ---"
          cat /tmp/api.log || true
          exit 1

      - name: Start Vite dev server (background)
        working-directory: src/client
        run: npm run dev &

      - name: Wait for Vite dev server
        run: |
          echo "Waiting for Vite dev server at http://localhost:5173..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Vite dev server ready"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Vite dev server did not start in time"
          exit 1

      - name: Burn-in loop (3 iterations)
        working-directory: src/client
        env:
          CI: "true"
          BASE_URL: "http://localhost:5173"
          API_URL: "http://localhost:5000"
        run: |
          echo "🔥 Starting burn-in — detecting flaky tests"
          for i in $(seq 1 3); do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔥 Iteration $i/3"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            npm run test:e2e || exit 1
          done
          echo "✅ Burn-in complete — no flaky tests detected"

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: burn-in-failures
          path: |
            src/client/test-results/
            src/client/playwright-report/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # MERGE REPORTS — Combine shard blobs into a single HTML report
  # ─────────────────────────────────────────────────────────────────────────────
  merge-reports:
    name: Merge Playwright Reports
    runs-on: ubuntu-latest
    needs: frontend-test
    if: always()

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/client/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/client
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v5
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        working-directory: src/client
        run: npx playwright merge-reports --reporter html ../../all-blob-reports

      - name: Upload merged Playwright report
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: src/client/playwright-report/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # REPORT — Job Summary
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, burn-in, merge-reports]
    if: always()

    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate Job Summary
        run: |
          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| ----- | ------ |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests (.NET / xUnit)  | ${{ needs.backend-test.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests (Playwright / 4 shards) | ${{ needs.frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Burn-In (flaky detection — 3 iterations) | ${{ needs.burn-in.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.burn-in.result }}" = "failure" ]; then
            echo "⚠️ **Flaky tests detected** — download \`burn-in-failures\` artifact for traces/videos." >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.frontend-test.result }}" = "failure" ]; then
            echo "❌ **E2E tests failed** — download the \`playwright-report\` artifact for the merged HTML report, or \`test-artifacts-shard-N\` for raw traces/videos." >> $GITHUB_STEP_SUMMARY
          fi

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY NOTES — Script Injection Prevention
# ─────────────────────────────────────────────────────────────────────────────
# When extending this pipeline into reusable workflows (workflow_call),
# manual dispatch (workflow_dispatch), or composite actions:
#
# RULE 1: NEVER interpolate ${{ inputs.* }} or ${{ github.event.* }} directly
#         inside a `run:` block — always pass through env: intermediaries.
# RULE 2: Inputs must be DATA, not COMMANDS — never accept command-shaped
#         inputs (e.g. install-command) that get executed as shell code.
#
# ✅ SAFE
#   - name: Run tests
#     env:
#       TEST_GREP: ${{ inputs.test-grep }}
#     run: |
#       # Security: inputs passed through env: to prevent script injection
#       npx playwright test --grep "$TEST_GREP"
#
# ❌ NEVER
#   - name: Run tests
#     run: npx playwright test --grep "${{ inputs.test-grep }}"
