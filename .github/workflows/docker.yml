name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  build-and-smoke:
    name: Build image and run smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fishtank:ci .

      - name: Start container
        run: docker run -d --name fishtank-smoke -p 5000:5000 fishtank:ci

      - name: Wait for health endpoint
        run: |
          timeout 30 sh -c 'until curl -sf http://localhost:5000/health; do sleep 1; done'

      - name: Assert health response
        run: |
          response=$(curl -s http://localhost:5000/health)
          echo "Health response: $response"
          echo "$response" | grep -qi "healthy"

      - name: Stop container
        if: always()
        run: |
          docker stop fishtank-smoke || true
          docker rm fishtank-smoke || true

  push-to-registry:
    name: Push image to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-smoke
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag name
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            nicoolodice/fishtank:latest
            nicoolodice/fishtank:${{ steps.tag.outputs.VERSION }}
