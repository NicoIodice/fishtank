# Team override for bmad-story-lifecycle.
# Committed — applies to every developer on this project.

[workflow]
# Load commit convention and changelog format into the AI's context for the whole run.
# The done-phase step uses these to write CHANGELOG entries and commit messages.
persistent_facts = [
  "file:CONTRIBUTING.md",
  "file:CHANGELOG.md",
]

activation_steps_append = [
  "RELEASE BRANCH MANAGEMENT (execute before preflight-test-design phase): Read '{project-root}/releases.yaml'. Find the release entry whose epic value matches this story's epic_id (e.g. 'epic-1' maps to version 'v0.1.0', branch 'release/v0.1.0'). Then:\n\n  (A) If the release status is 'pending' — this is the FIRST story for this release:\n      1. Run: git checkout main. Then run: git pull. If git pull exits with a non-zero code (merge conflict or network error), HALT immediately with message: 🚫 BLOCKED — git pull on main failed. Resolve any conflicts or connectivity issues, then re-run the lifecycle. Otherwise continue: git checkout -b {release_branch} && git push -u origin {release_branch}.\n      2. Update releases.yaml: set status -> 'in-progress', set started -> today's ISO date (YYYY-MM-DD). Write the file.\n      3. Add [Unreleased] section to CHANGELOG.md: Read '{project-root}/ROADMAP.md'. Find the section for {release_version} (e.g. '## v0.2.0 — Services Management (Epic 2)'). Extract the short description — the text between '— ' and ' (Epic' (e.g. 'Services Management'). Also extract the Theme line (the text after '**Theme:**' in that section). Then open '{project-root}/CHANGELOG.md'. Immediately after the introductory paragraphs (after the first '---' separator but before any '## [' section), insert: '## [Unreleased] — {release_version} ({short_description})\n\n_Theme: {theme_text}_\n\n---\n'. Write the file.\n      4. Commit the CHANGELOG.md change to the release branch: git add CHANGELOG.md releases.yaml && git commit -m 'chore(changelog): open [Unreleased] section for {release_version}' && git push origin {release_branch}.\n\n  (B) If the release status is 'in-progress' — the branch already exists.\n      Run: git checkout {release_branch}. Then run: git pull origin {release_branch}. If git pull exits with a non-zero code (merge conflict or network error), HALT immediately with message: 🚫 BLOCKED — git pull on {release_branch} failed. Resolve any conflicts or connectivity issues, then re-run the lifecycle.\n\n  (C) In both cases, create the story branch FROM the release branch: check with 'git branch --list story/{story_key}'. If the branch does NOT exist: git checkout -b story/{story_key} && git push -u origin story/{story_key}. If the branch already exists (lifecycle resume): git checkout story/{story_key}. Finally: update releases.yaml — find this story in the release's 'stories' list and set its status -> 'in-progress'. If the story is not in the list, add it with status 'in-progress'. Write the file.",
  "DONE PHASE — CHANGELOG, COMMIT, AND RELEASE CHECK (execute at the done phase, after the lifecycle-state file is marked 'done', before finishing). Execute ALL sub-steps in order:\n\n  STEP A — Update sprint-status.yaml: Read '{project-root}/_bmad-output/implementation-artifacts/sprint-status.yaml'. Find the key matching {story_key} and set its value -> 'done'. Write the file.\n\n  STEP B — Update releases.yaml and detect last story: Read '{project-root}/releases.yaml'. Find the release for this story's epic. Set this story's status -> 'done' in the stories list. Write the file. Count: total = number of stories in the release; done_count = number with status 'done'. Set is_last_story = (done_count == total).\n\n  STEP C — Write and finalize CHANGELOG.md:\n    (C1) Read the story artifact file '{implementation_artifacts}/{story_key}.md'. From its Acceptance Criteria, dev notes, and completed tasks, derive a concise list of what was Added, Changed, or Fixed.\n    (C2) Read '{project-root}/CHANGELOG.md'. Under the '[Unreleased]' section, append bullet points for each deliverable using the format from CONTRIBUTING.md (loaded via persistent_facts): '- **Feature name** — short description (`story/{story_key}`)'. Use the correct subsection heading (### Added / ### Fixed / ### Changed / ### Security). Do not duplicate entries already present.\n    (C3) IF is_last_story is true: rename the '## [Unreleased]' heading line (e.g. '## [Unreleased] — v0.1.0 (Foundation)') to '## [{release_version}] — {today_iso_date}'. Do NOT insert any new [Unreleased] section here — that is done automatically when the first story of the NEXT release starts (RELEASE BRANCH MANAGEMENT step A).\n    (C4) Write the file.\n\n  STEP D — Stage and commit: Run 'git add CHANGELOG.md releases.yaml {implementation_artifacts}/sprint-status.yaml'. Compose a commit message using the Conventional Commits format from CONTRIBUTING.md (loaded via persistent_facts). TYPE must match the story's primary change (feat, fix, security, etc.). SCOPE is the closest match from CONTRIBUTING.md. SHORT DESCRIPTION is a one-line summary of the story's main deliverable — this line surfaces verbatim in the GitHub Release changelog for end users. BODY lists 2–4 bullet points summarising key ACs delivered. FOOTER includes 'story/{story_key}'. Example shape: 'feat(auth): add JWT httpOnly cookie login and first-run setup\\n\\n- POST /api/auth/login issues JWT in httpOnly cookie\\n- Rate limiting on login endpoint (429 + Retry-After)\\n- First-run redirect to admin account creation screen\\n- Auto-migration creates DB schema on container start\\n\\nstory/1-2-database-authentication-backend-and-first-run-logic'. Run: git commit -m \"{composed message}\".\n\n  STEP E — Push: Run: git push origin story/{story_key}.\n\n  STEP F — PR warning: (A) If is_last_story is true AND no uncleared pre_ship_gates exist: update releases.yaml release status -> 'ready-for-merge'. Write the file. Display: '\n⚠️  ALL STORIES FOR {release_version} ARE COMPLETE ({done_count}/{total}).\nCHANGELOG.md has been versioned: [Unreleased] → [{release_version}] — {today_iso_date}.\nNext step: Open a PR from {release_branch} -> main.\nAfter the PR merges, CI will automatically: tag {release_version}, push Docker image :latest + :{release_version}, and create the GitHub Release.\nDo NOT push a manual git tag.' (B) If is_last_story is true AND there are uncleared pre_ship_gates: display the gate IDs and descriptions; instruct to set cleared -> true in releases.yaml once resolved, then re-run this check. (C) If is_last_story is false: display: '\nℹ️  Story done ({done_count}/{total} for {release_version}). Open a PR from story/{story_key} -> {release_branch}. Remaining: [list IDs of stories not yet done].'",
  "E2E TEST GATE (execute at the end of the test-automate phase, after all unit and integration tests pass, immediately before advancing current_phase to 'nfr'). This is a hard gate — the lifecycle MUST NOT advance to nfr until it passes or is explicitly waived.\n\n  STEP 1 — Check for story E2E spec: Look for a file matching src/client/tests/e2e/story-{story_key}.spec.ts (e.g. story-2-2-services-page.spec.ts). If no such file exists, log '⚠ No E2E spec found for {story_key} — E2E gate skipped' and advance to nfr immediately.\n\n  STEP 2 — Check app health: Run `(Invoke-WebRequest -Uri 'http://localhost:5000/health' -UseBasicParsing -ErrorAction SilentlyContinue).StatusCode` in PowerShell. If the result is NOT 200, HALT with: 🚫 BLOCKED — E2E gate requires the Fishtank app to be running at http://localhost:5000. Start the container with the support tool or: wsl -d Ubuntu -- bash -c \"cd /mnt/c/GIT/_Personal/fishtank/support/tools/fishtank-helper-tool && docker compose up -d --build\". Once /health returns 200, re-run the lifecycle.\n\n  STEP 3 — Run E2E tests: Execute in PowerShell: `cd C:\\GIT\\_Personal\\fishtank\\src\\client; $env:BASE_URL='http://localhost:5000'; $env:API_URL='http://localhost:5000'; npx playwright test --project=chromium tests/e2e/story-{story_key}.spec.ts --reporter=list 2>&1`. Capture full stdout/stderr and exit code.\n\n  STEP 4 — Evaluate result:\n    (A) Exit code 0: log '✅ E2E gate passed for {story_key} (all tests green)'. Advance to nfr phase.\n    (B) Exit code non-zero: extract each failing test name and error from the output. Log '⚠ E2E failures detected — entering QuickDev fix cycle'. Increment quickdev_cycle in lifecycle state.\n      - If quickdev_cycle > 2: HALT — status → blocked, blocked_reason → 'e2e gate failures after quickdev budget exhausted'. List all failing tests and errors in the HALT message.\n      - Otherwise: load bmad-quick-dev ({project-root}/.agents/skills/bmad-quick-dev/SKILL.md). For each failure: determine whether it is a code bug (fix src/) or a spec bug (fix tests/e2e/). Apply targeted fixes. Then: (1) run `cd src/client; npx tsc --noEmit -p tsconfig.app.json` to confirm TypeScript is clean; (2) run `dotnet test src/Fishtank.Api.IntegrationTests` to confirm integration tests still pass; (3) return to STEP 3 and re-run E2E tests."
]