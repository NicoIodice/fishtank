# Team override for bmad-story-lifecycle.
# Committed — applies to every developer on this project.

[workflow]
# Load commit convention and changelog format into the AI's context for the whole run.
# The done-phase step uses these to write CHANGELOG entries and commit messages.
persistent_facts = [
  "file:CONTRIBUTING.md",
  "file:CHANGELOG.md",
]

activation_steps_append = [
  "RELEASE BRANCH MANAGEMENT (execute before preflight-test-design phase): Read '{project-root}/releases.yaml'. Find the release entry whose epic value matches this story's epic_id (e.g. 'epic-1' maps to version 'v0.1.0', branch 'release/v0.1.0'). Then: (A) If the release status is 'pending' — this is the FIRST story for this release. Run in order: git checkout main && git pull && git checkout -b {release_branch} && git push -u origin {release_branch}. Then update releases.yaml: set status -> 'in-progress', set started -> today's ISO date (YYYY-MM-DD). Write the file. (B) If the release status is 'in-progress' — the branch already exists. Run: git checkout {release_branch} && git pull origin {release_branch}. (C) In both cases, create the story branch FROM the release branch: check with 'git branch --list story/{story_key}'. If the branch does NOT exist: git checkout -b story/{story_key} && git push -u origin story/{story_key}. If the branch already exists (lifecycle resume): git checkout story/{story_key}. Finally: update releases.yaml — find this story in the release's 'stories' list and set its status -> 'in-progress'. If the story is not in the list, add it with status 'in-progress'. Write the file.",
  "DONE PHASE — CHANGELOG, COMMIT, AND RELEASE CHECK (execute at the done phase, after the lifecycle-state file is marked 'done', before finishing). Execute ALL sub-steps in order:\n\n  STEP A — Update sprint-status.yaml: Read '{project-root}/_bmad-output/implementation-artifacts/sprint-status.yaml'. Find the key matching {story_key} and set its value -> 'done'. Write the file.\n\n  STEP B — Update releases.yaml and detect last story: Read '{project-root}/releases.yaml'. Find the release for this story's epic. Set this story's status -> 'done' in the stories list. Write the file. Count: total = number of stories in the release; done_count = number with status 'done'. Set is_last_story = (done_count == total).\n\n  STEP C — Write and finalize CHANGELOG.md:\n    (C1) Read the story artifact file '{implementation_artifacts}/{story_key}.md'. From its Acceptance Criteria, dev notes, and completed tasks, derive a concise list of what was Added, Changed, or Fixed.\n    (C2) Read '{project-root}/CHANGELOG.md'. Under the '[Unreleased]' section, append bullet points for each deliverable using the format from CONTRIBUTING.md (loaded via persistent_facts): '- **Feature name** — short description (`story/{story_key}`)'. Use the correct subsection heading (### Added / ### Fixed / ### Changed / ### Security). Do not duplicate entries already present.\n    (C3) IF is_last_story is true: rename the '## [Unreleased]' heading line (e.g. '## [Unreleased] — v0.1.0 (Epic 1: Foundation)') to '## [{release_version}] — {today_iso_date}'. Then insert a new empty unreleased block at the very top of the changelog (immediately after the introductory paragraphs and before the newly renamed section): '## [Unreleased]\n\n---\n'. This keeps the file ready for the next release.\n    (C4) Write the file.\n\n  STEP D — Stage and commit: Run 'git add CHANGELOG.md releases.yaml {implementation_artifacts}/sprint-status.yaml'. Compose a commit message using the Conventional Commits format from CONTRIBUTING.md (loaded via persistent_facts). TYPE must match the story's primary change (feat, fix, security, etc.). SCOPE is the closest match from CONTRIBUTING.md. SHORT DESCRIPTION is a one-line summary of the story's main deliverable — this line surfaces verbatim in the GitHub Release changelog for end users. BODY lists 2–4 bullet points summarising key ACs delivered. FOOTER includes 'story/{story_key}'. Example shape: 'feat(auth): add JWT httpOnly cookie login and first-run setup\\n\\n- POST /api/auth/login issues JWT in httpOnly cookie\\n- Rate limiting on login endpoint (429 + Retry-After)\\n- First-run redirect to admin account creation screen\\n- Auto-migration creates DB schema on container start\\n\\nstory/1-2-database-authentication-backend-and-first-run-logic'. Run: git commit -m \"{composed message}\".\n\n  STEP E — Push: Run: git push origin story/{story_key}.\n\n  STEP F — PR warning: (A) If is_last_story is true AND no uncleared pre_ship_gates exist: update releases.yaml release status -> 'ready-for-merge'. Write the file. Display: '\n⚠️  ALL STORIES FOR {release_version} ARE COMPLETE ({done_count}/{total}).\nCHANGELOG.md has been versioned: [Unreleased] → [{release_version}] — {today_iso_date}.\nNext step: Open a PR from {release_branch} -> main.\nAfter the PR merges, CI will automatically: tag {release_version}, push Docker image :latest + :{release_version}, and create the GitHub Release.\nDo NOT push a manual git tag.' (B) If is_last_story is true AND there are uncleared pre_ship_gates: display the gate IDs and descriptions; instruct to set cleared -> true in releases.yaml once resolved, then re-run this check. (C) If is_last_story is false: display: '\nℹ️  Story done ({done_count}/{total} for {release_version}). Open a PR from story/{story_key} -> {release_branch}. Remaining: [list IDs of stories not yet done].'",
]
