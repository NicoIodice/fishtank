# Team override for bmad-story-lifecycle.
# Committed — applies to every developer on this project.

[workflow]
# Load commit convention and changelog format into the AI's context for the whole run.
# The done-phase step uses these to write CHANGELOG entries and commit messages.
persistent_facts = [
  "file:CONTRIBUTING.md",
  "file:CHANGELOG.md",
]

activation_steps_append = [
  "RELEASE BRANCH MANAGEMENT (execute before preflight-test-design phase): Read '{project-root}/releases.yaml'. Find the release entry whose epic value matches this story's epic_id (e.g. 'epic-1' maps to version 'v0.1.0', branch 'release/v0.1.0'). Then: (A) If the release status is 'pending' — this is the FIRST story for this release. Run in order: git checkout main && git pull && git checkout -b {release_branch} && git push -u origin {release_branch}. Then update releases.yaml: set status -> 'in-progress', set started -> today's ISO date (YYYY-MM-DD). Write the file. (B) If the release status is 'in-progress' — the branch already exists. Run: git checkout {release_branch} && git pull origin {release_branch}. (C) In both cases, create the story branch FROM the release branch: check with 'git branch --list story/{story_key}'. If the branch does NOT exist: git checkout -b story/{story_key} && git push -u origin story/{story_key}. If the branch already exists (lifecycle resume): git checkout story/{story_key}. Finally: update releases.yaml — find this story in the release's 'stories' list and set its status -> 'in-progress'. If the story is not in the list, add it with status 'in-progress'. Write the file.",
  "DONE PHASE — CHANGELOG, COMMIT, AND RELEASE CHECK (execute at the done phase, after the lifecycle-state file is marked 'done', before finishing). Execute ALL sub-steps in order:\n\n  STEP A — Update sprint-status.yaml: Read '{project-root}/_bmad-output/implementation-artifacts/sprint-status.yaml'. Find the key matching {story_key} and set its value -> 'done'. Write the file.\n\n  STEP B — Update releases.yaml: Read '{project-root}/releases.yaml'. Find the release for this story's epic. Set this story's status -> 'done' in the stories list. Write the file.\n\n  STEP C — Write CHANGELOG.md entries: Read the story artifact file '{implementation_artifacts}/{story_key}.md'. From its Acceptance Criteria, dev notes, and the tasks that were completed, derive a concise list of what was Added, Changed, or Fixed. Then read '{project-root}/CHANGELOG.md'. Under the '[Unreleased]' section, append bullet points for each deliverable using the format documented in CONTRIBUTING.md (loaded via persistent_facts): '- **Feature name** — short description (`story/{story_key}`)'. Use the correct subsection heading: '### Added' for new capabilities, '### Fixed' for bug fixes, '### Changed' for behaviour changes. Do not duplicate entries already present. Write the file.\n\n  STEP D — Stage and commit: Run 'git add CHANGELOG.md releases.yaml {implementation_artifacts}/sprint-status.yaml'. Then compose a commit message using the Conventional Commits format defined in CONTRIBUTING.md (loaded via persistent_facts). The TYPE must match the story's primary change (feat, fix, security, etc.). The SCOPE must be the closest matching scope from CONTRIBUTING.md. The SHORT DESCRIPTION must be a one-line summary of the story's main deliverable — this exact line is what GitHub Release changelog will surface to end users. The optional BODY should list 2–4 bullet points summarising the key ACs delivered. The FOOTER must include 'story/{story_key}'. Example shape: 'feat(auth): add JWT httpOnly cookie login and first-run setup\\n\\n- POST /api/auth/login issues JWT in httpOnly cookie\\n- Rate limiting on login endpoint (429 + Retry-After)\\n- First-run redirect to admin account creation screen\\n- Auto-migration creates DB schema on container start\\n\\nstory/1-2-database-authentication-backend-and-first-run-logic'. Run: git commit -m \"{composed message}\".\n\n  STEP E — Push: Run: git push origin story/{story_key}.\n\n  STEP F — Release check: Count stories in the release: total = number in stories list; done_count = number with status 'done'. (A) If done_count == total AND no uncleared pre_ship_gates: update releases.yaml release status -> 'ready-for-merge'. Write the file. Display: '\n⚠️  ALL STORIES FOR {release_version} ARE COMPLETE ({done_count}/{total}).\\nNext step: Before opening the PR, update CHANGELOG.md — move all [Unreleased] entries to a new versioned section [version] — YYYY-MM-DD.\\nThen open a PR from {release_branch} -> main.\\nAfter the PR merges, CI will automatically: tag {release_version}, push Docker image :latest + :{release_version}, create the GitHub Release.\\nDo NOT push a manual git tag.' (B) If done_count == total AND there are uncleared pre_ship_gates: display the gate IDs and descriptions; instruct to set cleared -> true once resolved, then PR. (C) If done_count < total: display: '\nℹ️  Story done ({done_count}/{total} for {release_version}). Open a PR from story/{story_key} -> {release_branch}. Remaining: [list IDs of stories not done].'",
]
