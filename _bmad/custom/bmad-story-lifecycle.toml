# Team override for bmad-story-lifecycle.
# Committed — applies to every developer on this project.

[workflow]
activation_steps_append = [
  "RELEASE BRANCH MANAGEMENT (execute before preflight-test-design phase): Read '{project-root}/releases.yaml'. Find the release entry whose epic value matches this story's epic_id (e.g. 'epic-1' maps to version 'v0.1.0', branch 'release/v0.1.0'). Then: (A) If the release status is 'pending' — this is the FIRST story for this release. Run in order: git checkout main && git pull && git checkout -b {release_branch} && git push -u origin {release_branch}. Then update releases.yaml: set status -> 'in-progress', set started -> today's ISO date (YYYY-MM-DD). Write the file. (B) If the release status is 'in-progress' — the branch already exists. Run: git checkout {release_branch} && git pull origin {release_branch}. (C) In both cases, create the story branch FROM the release branch: check with 'git branch --list story/{story_key}'. If the branch does NOT exist: git checkout -b story/{story_key} && git push -u origin story/{story_key}. If the branch already exists (lifecycle resume): git checkout story/{story_key}. Finally: update releases.yaml — find this story in the release's 'stories' list and set its status -> 'in-progress'. If the story is not in the list, add it with status 'in-progress'. Write the file.",
  "DONE PHASE RELEASE CHECK (execute at the done phase, after the lifecycle-state file is marked 'done', before finishing): Read '{project-root}/releases.yaml'. Find the release for this story's epic. Set this story's status -> 'done' in the stories list. Write the file. Then count: total = number of stories in the release; done_count = number with status 'done'. (A) If done_count == total AND the release has NO pre_ship_gates OR all gates are cleared: update release status -> 'ready-for-merge'. Write the file. Display: '\n⚠️  ALL STORIES FOR {release_version} ARE COMPLETE ({done_count}/{total}).\nNext step: Open a PR from {release_branch} -> main.\nAfter the PR is merged, CI will automatically:\n  1. Tag the commit as {release_version}\n  2. Build and smoke-test the Docker image\n  3. Push nicoiodice/fishtank:{release_version} and :latest to Docker Hub\n  4. Create the GitHub Release with changelog\nDo NOT push a manual git tag. Update CHANGELOG.md by moving [Unreleased] entries to [{release_version}] before opening the PR.' (B) If done_count == total AND there are uncleared pre_ship_gates: display: '\n⚠️  ALL STORIES FOR {release_version} ARE COMPLETE but the following pre-ship gates must be cleared before the PR to main:\n  [list each uncleared gate: id — description]\nOnce all gates are cleared, update pre_ship_gates[].cleared -> true in releases.yaml, then open the PR.' (C) If done_count < total: display: '\nℹ️  Story {story_key} done ({done_count}/{total} for {release_version}).\nNext step: Open a PR from story/{story_key} -> {release_branch}.\nRemaining stories: [list the IDs of stories with status != done].'",
]
