# Team override for bmad-dev-story.
# Committed — applies to every developer on this project.

[workflow]
activation_steps_append = [
  "REQUIRED PRE-FLIGHT CHECK: Before proceeding, confirm that bmad-testarch-atdd has been completed for the story being implemented. If no ATDD/acceptance test scaffold exists for this story or epic, warn Nico that bmad-testarch-atdd is a required phase 4 deliverable and ask for confirmation before continuing.",
  "STATUS UPDATE: At the very start of implementation (before writing any code), update the story's status in _bmad-output/implementation-artifacts/sprint-status.yaml from 'ready-for-dev' to 'in-progress'.",
  "STATUS UPDATE: When implementation is complete and all DoD gates 1-7 pass (per project-context.md Definition of Done section), update the story's status to 'review' in sprint-status.yaml. If this was the last story in the epic, also update the epic status to 'in-progress' (if not already) or 'done' (if all stories are done).",
  "BRANCH CREATION (Step 4): Ensure you are on branch `feature/{story_key}` before writing any code. Check with `git branch --list feature/{story_key}`. If the branch does NOT exist locally or on origin, create it and push: `git checkout -b feature/{story_key}` then `git push -u origin feature/{story_key}`. If it already exists (ATDD ran first, or story is being resumed), switch to it: `git checkout feature/{story_key}`. Branch naming convention: `feature/{story_key}` — e.g. `feature/1-2-user-auth`.",
  "FINAL COMMIT & PUSH (Step 9 — after all DoD gates pass): Once all Definition-of-Done gates are satisfied and the story status is updated to 'review', stage every change, commit with message `story({story_key}): <concise one-line summary of what was implemented>`, then push to the remote branch to trigger the CI pipeline. Run: `git add -A` then `git commit -m 'story({story_key}): {summary}'` then `git push origin feature/{story_key}`. Report the push URL and remind Nico to monitor the GitHub Actions pipeline at https://github.com/NicoIodice/fishtank/actions.",
]
