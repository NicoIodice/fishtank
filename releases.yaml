# Machine-read by the BMad lifecycle orchestrator and bmad-create-story skill.
# Human reference: see ROADMAP.md for full feature descriptions per release.
#
# STATUS DEFINITIONS:
# ===================
# Release status:
#   pending          — Epic not started; release branch does not exist yet
#   in-progress      — At least one story started; release branch exists
#   ready-for-merge  — All stories done; awaiting PR: release/vX.Y.Z -> main
#   released         — Merged to main; Docker image published; GitHub Release created
#
# Story status:
#   backlog          — Story listed but not yet started (no lifecycle run)
#   in-progress      — Lifecycle orchestrator has started the story
#   done             — All lifecycle gates passed; story committed to release branch
#
# VERSIONING STRATEGY:
# ====================
#   PATCH (vX.Y.Z, Z>0) — Bug fix, hotfix, security patch, minor improvement.
#                          Branch: hotfix/vX.Y.Z from main.
#   MINOR (v0.X.0)      — Each epic/feature set completion (pre-1.0 phase).
#                          Branch: release/v0.X.0 from main.
#   MAJOR (v1.0.0+)     — Production-ready milestone or breaking architectural change.
#                          v0.x.0 = pre-release builds; v1.0.0 = first stable release
#                          (see Epic 6 — Release Polish & Distribution in ROADMAP.md).
#
# HOTFIX ENTRIES: Use version "vX.Y.Z" where Z > 0, hotfix: true.
# The hotfix branch is branched from main: hotfix/vX.Y.Z.
# Required fields: version, hotfix: true, base_version, status, branch, started.

